# Tokyo Night tmux — test configuration
# Usage: tmux -L tokyo-test -f test/tmux-test.conf new-session -d
#
# This config sets every option to exercise all code paths.
# It does NOT source your real ~/.tmux.conf.

set -g default-terminal "tmux-256color"
set -g status-interval 1
set -g status-position top

# Point TPM at local repo (adjust if your checkout is elsewhere)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '/home/projects/tokyo-night-tmux'

# ── Theme ──────────────────────────────────────────────────────────
set -g @tokyo-night-tmux_theme        "night"
set -g @tokyo-night-tmux_transparent  0

# ── Plugin toggle ─────────────────────────────────────────────────
set -g @tokyo-night-tmux_show_netspeed 1

# ── Enhanced netspeed ─────────────────────────────────────────────
set -g @tokyo-night-tmux_netspeed_showip         "both"   # local + public IP
set -g @tokyo-night-tmux_netspeed_show_country   1        # country flag
set -g @tokyo-night-tmux_netspeed_show_dns       1        # DNS server
set -g @tokyo-night-tmux_netspeed_ip_refresh_rate 30      # short for testing
set -g @tokyo-night-tmux_netspeed_refresh        1

# ── Second status line ────────────────────────────────────────────
set -g @tokyo-night-tmux_show_second_status 1
# Uncomment to test widget reordering instead of default full netspeed:
# set -g @tokyo-night-tmux_show_second_left_widgets  "date_and_time, hostname"
# set -g @tokyo-night-tmux_show_second_right_widgets "netspeed"

# ── Widget toggles ────────────────────────────────────────────────
# Main bar: path, git, wbg, time
set -g @tokyo-night-tmux_show_path      1
set -g @tokyo-night-tmux_show_git       1
set -g @tokyo-night-tmux_show_wbg       1
set -g @tokyo-night-tmux_show_datetime  1

# Second bar: all network info (via netspeed_full default)
set -g @tokyo-night-tmux_show_netspeed  1

# Disabled
set -g @tokyo-night-tmux_show_battery_widget  0
set -g @tokyo-night-tmux_show_music           0
set -g @tokyo-night-tmux_show_hostname        0

# ── Source the plugin ─────────────────────────────────────────────
run-shell /home/projects/tokyo-night-tmux/tokyo-night.tmux
